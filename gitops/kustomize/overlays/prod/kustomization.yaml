apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: haiip-prod

bases:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: haiip-api
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: haiip-worker

configMapGenerator:
  - name: haiip-config
    behavior: merge
    literals:
      - APP_ENV=production
      - LOG_LEVEL=WARNING

images:
  - name: haiip-api
    newName: ghcr.io/aliipou/haiip-api
    newTag: "1.0.0"
  - name: haiip-worker
    newName: ghcr.io/aliipou/haiip-worker
    newTag: "1.0.0"
  - name: haiip-dashboard
    newName: ghcr.io/aliipou/haiip-dashboard
    newTag: "1.0.0"

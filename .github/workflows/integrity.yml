name: Integrity Gate — Documentation Honesty & Simulation Flags

# Runs on every PR and every push to main/develop.
# MUST pass before any merge regardless of other test results.
#
# What this checks:
#   1. docs/RESULTS.md does not mix pending markers with numbers
#   2. simulation_confidence and field_study_required flags are present
#   3. DataSourceMode enum covers all three modes
#   4. docs/LIMITATIONS.md exists and covers L1-L4
#   5. haiip/core/ has no TODO/FIXME/placeholder text

on:
  push:
    branches: [main, develop, "feat/**", "fix/**", experimental]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  HAIIP_APP_ENV: testing
  HAIIP_SECRET_KEY: ci-test-secret-key-not-for-production-use
  HAIIP_DATABASE_URL: sqlite+aiosqlite:///./test.db

jobs:
  documentation-honesty:
    name: Documentation Honesty Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" || pip install \
            pytest numpy pandas scikit-learn structlog

      - name: Run documentation honesty tests
        run: |
          pytest haiip/tests/test_documentation_honesty.py \
            -v --tb=short
        env:
          HAIIP_APP_ENV: testing

  simulation-flags:
    name: Simulation Flag Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check simulation_confidence hardcoded as LOW
        run: |
          grep -q "'LOW'" haiip/core/oversight_simulation.py || \
          grep -q '"LOW"' haiip/core/oversight_simulation.py || \
          (echo "ERROR: simulation_confidence='LOW' not found in oversight_simulation.py" && exit 1)
          echo "OK: simulation_confidence hardcoded"

      - name: Check field_study_required=True
        run: |
          grep -q "field_study_required" haiip/core/oversight_simulation.py || \
          (echo "ERROR: field_study_required not found in oversight_simulation.py" && exit 1)
          echo "OK: field_study_required present"

      - name: Check DataSourceMode has all three modes
        run: |
          for mode in REAL_HARDWARE SIMULATION HARDWARE_FALLBACK; do
            grep -q "$mode" haiip/data/ingestion/opcua_connector.py || \
            (echo "ERROR: DataSourceMode.$mode not found in opcua_connector.py" && exit 1)
            echo "OK: $mode found"
          done

      - name: Check LIMITATIONS.md covers L1-L4
        run: |
          for label in L1 L2 L3 L4; do
            grep -q "$label" docs/LIMITATIONS.md || \
            (echo "ERROR: Limitation $label not found in LIMITATIONS.md" && exit 1)
            echo "OK: $label found"
          done

      - name: Check no TODO/FIXME in haiip/core/
        run: |
          if grep -rn "TODO\|FIXME\|placeholder\|fake data\|dummy data" haiip/core/ \
              --include="*.py"; then
            echo "ERROR: Found forbidden words in haiip/core/"
            exit 1
          fi
          echo "OK: no forbidden words in haiip/core/"

  integrity-gate:
    name: Integrity Gate
    runs-on: ubuntu-latest
    needs: [documentation-honesty, simulation-flags]
    if: always()
    steps:
      - name: Check integrity jobs passed
        run: |
          python3 - <<'EOF'
          import json, sys
          results = json.loads('''${{ toJSON(needs) }}''')
          failed = [name for name, r in results.items() if r['result'] != 'success']
          if failed:
              print(f"INTEGRITY GATE FAILED: {failed}")
              print("These tests must pass before merge.")
              sys.exit(1)
          print("Integrity gate passed — documentation is honest and simulation flags are set.")
          EOF

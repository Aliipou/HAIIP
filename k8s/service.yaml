apiVersion: v1
kind: Service
metadata:
  name: haiip-api
  namespace: haiip
  labels:
    app: haiip-api
spec:
  selector:
    app: haiip-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: haiip-dashboard
  namespace: haiip
  labels:
    app: haiip-dashboard
spec:
  selector:
    app: haiip-dashboard
  ports:
    - name: streamlit
      port: 8501
      targetPort: 8501
  type: ClusterIP
---
apiVersion: v1
kind: Namespace
metadata:
  name: haiip
  labels:
    name: haiip
    eu-ai-act-compliant: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: haiip-api
  namespace: haiip
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/haiip-api-role
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: haiip-model-cache
  namespace: haiip
spec:
  accessModes: [ReadWriteMany]
  storageClassName: efs-sc
  resources:
    requests:
      storage: 10Gi

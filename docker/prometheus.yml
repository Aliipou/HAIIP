global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "prometheus_alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # set to ["alertmanager:9093"] when Alertmanager is deployed

scrape_configs:
  - job_name: "haiip-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "haiip-worker"
    static_configs:
      - targets: ["worker:9100"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

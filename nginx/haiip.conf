# HAIIP — Production NGINX Configuration
# TLS termination, reverse proxy, rate limiting, security headers
#
# Prerequisites:
#   1. Obtain TLS certs via Let's Encrypt:
#        certbot certonly --nginx -d your-domain.com
#   2. Replace YOUR_DOMAIN with your actual domain
#   3. Place this file at /etc/nginx/sites-enabled/haiip.conf
#   4. Test: nginx -t && systemctl reload nginx

# ── Rate-limit zones (per real client IP) ─────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_general:10m  rate=120r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m     rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_predict:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_agent:10m    rate=20r/m;

# ── Upstream services ──────────────────────────────────────────────────────────
upstream haiip_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream haiip_dashboard {
    server 127.0.0.1:8501;
    keepalive 8;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — API + Dashboard ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── TLS (Let's Encrypt) ───────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"
        always;
    server_tokens off;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── FastAPI — /api/ and /health ───────────────────────────────────────────
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://haiip_api;
        include            /etc/nginx/proxy_params;
    }

    location /api/v1/predict {
        limit_req zone=api_predict burst=20 nodelay;
        limit_req_status 429;
        proxy_pass         http://haiip_api;
        include            /etc/nginx/proxy_params;
    }

    location /api/v1/agent {
        limit_req zone=api_agent burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://haiip_api;
        include            /etc/nginx/proxy_params;
    }

    location /api/ {
        limit_req zone=api_general burst=30 nodelay;
        limit_req_status 429;
        proxy_pass         http://haiip_api;
        include            /etc/nginx/proxy_params;
    }

    location /health {
        proxy_pass         http://haiip_api;
        include            /etc/nginx/proxy_params;
        access_log         off;
    }

    location /metrics {
        # Internal only — block from public internet
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny  all;
        proxy_pass         http://haiip_api;
        include            /etc/nginx/proxy_params;
    }

    # ── Streamlit dashboard — / ────────────────────────────────────────────────
    # WebSocket support required for Streamlit
    location /_stcore/stream {
        proxy_pass         http://haiip_dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass         http://haiip_dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
